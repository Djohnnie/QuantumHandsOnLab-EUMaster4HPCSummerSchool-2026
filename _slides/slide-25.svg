<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Slide 25: The potential power of Quantum - 2/3/4 qubits (based on Quantum-Summer-Lab-2025 slide 215.jpg) -->
<svg width="3840" height="2160" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0B0F1E"/>
      <stop offset="55%"  stop-color="#0F1530"/>
      <stop offset="100%" stop-color="#151B3B"/>
    </linearGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4FD8E8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4FD8E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8B6BE0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8B6BE0" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3FD0E0"/>
      <stop offset="100%" stop-color="#8B6BE0"/>
    </linearGradient>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect x="0" y="0" width="3840" height="2160" fill="url(#bgGradient)"/>

  <!-- Subtle circuit-board style grid lines (very low opacity) -->
  <g stroke="#4FD8E8" stroke-width="1.5" opacity="0.06">
    <line x1="0" y1="360"  x2="3840" y2="360"/>
    <line x1="0" y1="720"  x2="3840" y2="720"/>
    <line x1="0" y1="1080" x2="3840" y2="1080"/>
    <line x1="0" y1="1440" x2="3840" y2="1440"/>
    <line x1="0" y1="1800" x2="3840" y2="1800"/>
    <line x1="640"  y1="0" x2="640"  y2="2160"/>
    <line x1="1280" y1="0" x2="1280" y2="2160"/>
    <line x1="1920" y1="0" x2="1920" y2="2160"/>
    <line x1="2560" y1="0" x2="2560" y2="2160"/>
    <line x1="3200" y1="0" x2="3200" y2="2160"/>
  </g>

  <!-- Decorative glows -->
  <circle cx="3450" cy="260" r="520" fill="url(#glowCyan)"/>
  <circle cx="420" cy="1950" r="560" fill="url(#glowPurple)"/>

  <!-- ============ HEADER / EYEBROW ============ -->
  <text x="160" y="200" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="63"
        letter-spacing="9" fill="#4FD8E8" font-weight="600">THE POTENTIAL POWER OF QUANTUM</text>

  <!-- Accent rule -->
  <rect x="160" y="250" width="330" height="12" rx="6" fill="url(#accentGradient)"/>

  <!-- ============ CONTENT: 2 qubits ============ -->
  <text x="1920" y="620" text-anchor="middle" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="90"
        font-weight="700" fill="#F5F6FA">2 qubits</text>

  <text x="1920" y="770" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="140"
        font-weight="400" fill="#F5F6FA"
  ><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#945;</tspan><tspan>|00&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#946;</tspan><tspan>|01&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#947;</tspan><tspan>|10&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#948;</tspan><tspan>|11&#10217;</tspan></text>

  <!-- ============ CONTENT: 3 qubits ============ -->
  <text x="1920" y="990" text-anchor="middle" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="78"
        font-weight="700" fill="#F5F6FA">3 qubits</text>

  <text x="1920" y="1180" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="108"
        font-weight="400" fill="#F5F6FA"
  ><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#945;</tspan><tspan>|000&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#946;</tspan><tspan>|001&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#947;</tspan><tspan>|010&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#948;</tspan><tspan>|011&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#949;</tspan><tspan>|100&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#1013;</tspan><tspan>|110&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#950;</tspan><tspan>|101&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#951;</tspan><tspan>|111&#10217;</tspan></text>

  <!-- ============ CONTENT: 4 qubits ============ -->
  <text x="1920" y="1420" text-anchor="middle" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="68"
        font-weight="700" fill="#F5F6FA">4 qubits</text>

  <text x="1920" y="1520" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48"
        font-weight="400" fill="#F5F6FA"
  ><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#945;</tspan><tspan>|0000&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#946;</tspan><tspan>|0001&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#947;</tspan><tspan>|0010&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#948;</tspan><tspan>|0011&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#949;</tspan><tspan>|0100&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#1013;</tspan><tspan>|0110&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#950;</tspan><tspan>|0101&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#951;</tspan><tspan>|0111&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#952;</tspan><tspan>|1000&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#977;</tspan><tspan>|1001&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#953;</tspan><tspan>|1010&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#954;</tspan><tspan>|1011&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#955;</tspan><tspan>|1100&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#956;</tspan><tspan>|1110&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#957;</tspan><tspan>|1101&#10217; + </tspan><tspan font-style="italic" font-weight="700" fill="url(#accentGradient)">&#958;</tspan><tspan>|1111&#10217;</tspan></text>

  <!-- ============ FOOTER ============ -->
  <line x1="160" y1="2000" x2="3680" y2="2000" stroke="#2C3560" stroke-width="2"/>

  <text x="160" y="2065" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="45" fill="#7C86A8">EUMaster4HPC Summer School 2026</text>
  <text x="1920" y="2065" text-anchor="middle" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="45" fill="#7C86A8">Microsoft &#8226; The Cronos Group</text>

  <text x="3680" y="2065" text-anchor="end" font-family="Segoe UI, Calibri, Arial, sans-serif"
        font-size="45" fill="#7C86A8">25</text>

</svg>
