<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Slide 38: H-Gate - applying the matrix to |0> and |1> to derive |+> and |-> (based on Quantum-Summer-Lab-2025 slide 220.jpg) -->
<svg width="3840" height="2160" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0B0F1E"/>
      <stop offset="55%"  stop-color="#0F1530"/>
      <stop offset="100%" stop-color="#151B3B"/>
    </linearGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4FD8E8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4FD8E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8B6BE0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8B6BE0" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3FD0E0"/>
      <stop offset="100%" stop-color="#8B6BE0"/>
    </linearGradient>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect x="0" y="0" width="3840" height="2160" fill="url(#bgGradient)"/>

  <!-- Subtle circuit-board style grid lines (very low opacity) -->
  <g stroke="#4FD8E8" stroke-width="1.5" opacity="0.06">
    <line x1="0" y1="360"  x2="3840" y2="360"/>
    <line x1="0" y1="720"  x2="3840" y2="720"/>
    <line x1="0" y1="1080" x2="3840" y2="1080"/>
    <line x1="0" y1="1440" x2="3840" y2="1440"/>
    <line x1="0" y1="1800" x2="3840" y2="1800"/>
    <line x1="640"  y1="0" x2="640"  y2="2160"/>
    <line x1="1280" y1="0" x2="1280" y2="2160"/>
    <line x1="1920" y1="0" x2="1920" y2="2160"/>
    <line x1="2560" y1="0" x2="2560" y2="2160"/>
    <line x1="3200" y1="0" x2="3200" y2="2160"/>
  </g>

  <!-- Decorative glows -->
  <circle cx="3450" cy="260" r="520" fill="url(#glowCyan)"/>
  <circle cx="420" cy="1950" r="560" fill="url(#glowPurple)"/>

  <!-- ============ HEADER / EYEBROW ============ -->
  <text x="160" y="200" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="63"
        letter-spacing="9" fill="#4FD8E8" font-weight="600">H-GATE</text>

  <!-- Accent rule -->
  <rect x="160" y="250" width="330" height="12" rx="6" fill="url(#accentGradient)"/>

  <g transform="translate(-95.50,-619.00) scale(1.45)">


  <!-- ============ ROW 1: |0> through the H matrix -> |+> ============ -->
  <g transform="translate(230,980)">
    <text x="0" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#F5F6FA">|0&#10217;<tspan fill="#8B6BE0" dx="18">&#8658;</tspan></text>

    <!-- H matrix -->
    <g transform="translate(500,0)">
      <path d="M -143,-138 Q -176,6 -143,149" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <path d="M 132,-138 Q 165,6 132,149" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>

      <text x="-77" y="-104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">1</text>
      <line x1="-97" y1="-88" x2="-57" y2="-88" stroke="#F5F6FA" stroke-width="3"/>
      <text x="-77" y="-52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F6FA">&#8730;2</text>

      <text x="77" y="-104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">1</text>
      <line x1="57" y1="-88" x2="97" y2="-88" stroke="#F5F6FA" stroke-width="3"/>
      <text x="77" y="-52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F6FA">&#8730;2</text>

      <text x="-77" y="50" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">1</text>
      <line x1="-97" y1="66" x2="-57" y2="66" stroke="#F5F6FA" stroke-width="3"/>
      <text x="-77" y="118" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F6FA">&#8730;2</text>

      <text x="30" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">&#8722;</text>
      <text x="99" y="50" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">1</text>
      <line x1="79" y1="66" x2="119" y2="66" stroke="#F5F6FA" stroke-width="3"/>
      <text x="99" y="118" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F6FA">&#8730;2</text>

      <text x="176" y="163" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-style="italic" fill="#8B6BE0">H</text>
    </g>

    <!-- (1,0) vector -->
    <g transform="translate(880,0)">
      <path d="M -25,-40 Q -40,18 -25,74" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <path d="M 25,-40 Q 40,18 25,74" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <text x="0" y="-4" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">1</text>
      <text x="0" y="56" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">0</text>
    </g>

    <text x="990" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#F5F6FA">=</text>

    <!-- result vector (1/sqrt2 ; 1/sqrt2) -->
    <g transform="translate(1220,0)">
      <path d="M -75,-105 Q -110,15 -75,132" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <path d="M 75,-105 Q 110,15 75,132" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <text x="0" y="-60" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">1</text>
      <line x1="-30" y1="-42" x2="30" y2="-42" stroke="#F5F6FA" stroke-width="4"/>
      <text x="0" y="18" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#F5F6FA">&#8730;2</text>
      <text x="0" y="65" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">1</text>
      <line x1="-30" y1="83" x2="30" y2="83" stroke="#F5F6FA" stroke-width="4"/>
      <text x="0" y="123" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#F5F6FA">&#8730;2</text>
    </g>

    <text x="1430" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#F5F6FA">=</text>

    <!-- inline fraction (|0>+|1>)/sqrt2 -->
    <g transform="translate(1780,0)">
      <text x="0" y="-18" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="60" fill="#F5F6FA">|0&#10217; + |1&#10217;</text>
      <line x1="-235" y1="8" x2="235" y2="8" stroke="#F5F6FA" stroke-width="4"/>
      <text x="0" y="70" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#F5F6FA">&#8730;2</text>
    </g>

    <text x="2070" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#F5F6FA">=</text>
    <text x="2170" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#8B6BE0">|+&#10217;</text>
  </g>

  <!-- ============ ROW 2: |1> through the H matrix -> |-> ============ -->
  <g transform="translate(230,1430)">
    <text x="0" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#F5F6FA">|1&#10217;<tspan fill="#8B6BE0" dx="18">&#8658;</tspan></text>

    <!-- H matrix -->
    <g transform="translate(500,0)">
      <path d="M -143,-138 Q -176,6 -143,149" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <path d="M 132,-138 Q 165,6 132,149" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>

      <text x="-77" y="-104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">1</text>
      <line x1="-97" y1="-88" x2="-57" y2="-88" stroke="#F5F6FA" stroke-width="3"/>
      <text x="-77" y="-52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F6FA">&#8730;2</text>

      <text x="77" y="-104" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">1</text>
      <line x1="57" y1="-88" x2="97" y2="-88" stroke="#F5F6FA" stroke-width="3"/>
      <text x="77" y="-52" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F6FA">&#8730;2</text>

      <text x="-77" y="50" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">1</text>
      <line x1="-97" y1="66" x2="-57" y2="66" stroke="#F5F6FA" stroke-width="3"/>
      <text x="-77" y="118" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F6FA">&#8730;2</text>

      <text x="30" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">&#8722;</text>
      <text x="99" y="50" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#F5F6FA">1</text>
      <line x1="79" y1="66" x2="119" y2="66" stroke="#F5F6FA" stroke-width="3"/>
      <text x="99" y="118" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F6FA">&#8730;2</text>

      <text x="176" y="163" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-style="italic" fill="#8B6BE0">H</text>
    </g>

    <!-- (0,1) vector -->
    <g transform="translate(880,0)">
      <path d="M -25,-40 Q -40,18 -25,74" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <path d="M 25,-40 Q 40,18 25,74" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <text x="0" y="-4" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">0</text>
      <text x="0" y="56" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">1</text>
    </g>

    <text x="990" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#F5F6FA">=</text>

    <!-- result vector (1/sqrt2 ; -1/sqrt2) -->
    <g transform="translate(1220,0)">
      <path d="M -95,-105 Q -130,15 -95,132" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <path d="M 95,-105 Q 130,15 95,132" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-linecap="round"/>
      <text x="-15" y="-60" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">1</text>
      <line x1="-45" y1="-42" x2="15" y2="-42" stroke="#F5F6FA" stroke-width="4"/>
      <text x="-15" y="18" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#F5F6FA">&#8730;2</text>
      <text x="-55" y="83" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">&#8722;</text>
      <text x="15" y="65" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F5F6FA">1</text>
      <line x1="-15" y1="83" x2="45" y2="83" stroke="#F5F6FA" stroke-width="4"/>
      <text x="15" y="123" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#F5F6FA">&#8730;2</text>
    </g>

    <text x="1450" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#F5F6FA">=</text>

    <!-- inline fraction (|0>-|1>)/sqrt2 -->
    <g transform="translate(1810,0)">
      <text x="0" y="-18" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="60" fill="#F5F6FA">|0&#10217; &#8722; |1&#10217;</text>
      <line x1="-240" y1="8" x2="240" y2="8" stroke="#F5F6FA" stroke-width="4"/>
      <text x="0" y="70" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#F5F6FA">&#8730;2</text>
    </g>

    <text x="2110" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#F5F6FA">=</text>
    <text x="2210" y="20" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#8B6BE0">|&#8722;&#10217;</text>
  </g>

  
  </g>

  <!-- ============ FOOTER ============ -->
  <line x1="160" y1="2000" x2="3680" y2="2000" stroke="#2C3560" stroke-width="2"/>

  <text x="160" y="2065" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="45" fill="#7C86A8">EUMaster4HPC Summer School 2026</text>
  <text x="1920" y="2065" text-anchor="middle" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="45" fill="#7C86A8">Microsoft &#8226; The Cronos Group</text>

  <text x="3680" y="2065" text-anchor="end" font-family="Segoe UI, Calibri, Arial, sans-serif"
        font-size="45" fill="#7C86A8">38</text>

</svg>
