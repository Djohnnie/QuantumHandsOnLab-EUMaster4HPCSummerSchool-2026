<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Slide 45: CNOT-Gate - two-qubit circuit symbol and 4x4 matrix (based on Quantum-Summer-Lab-2025 slide 227.jpg) -->
<svg width="3840" height="2160" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0B0F1E"/>
      <stop offset="55%"  stop-color="#0F1530"/>
      <stop offset="100%" stop-color="#151B3B"/>
    </linearGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4FD8E8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4FD8E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8B6BE0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8B6BE0" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3FD0E0"/>
      <stop offset="100%" stop-color="#8B6BE0"/>
    </linearGradient>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect x="0" y="0" width="3840" height="2160" fill="url(#bgGradient)"/>

  <!-- Subtle circuit-board style grid lines (very low opacity) -->
  <g stroke="#4FD8E8" stroke-width="1.5" opacity="0.06">
    <line x1="0" y1="360"  x2="3840" y2="360"/>
    <line x1="0" y1="720"  x2="3840" y2="720"/>
    <line x1="0" y1="1080" x2="3840" y2="1080"/>
    <line x1="0" y1="1440" x2="3840" y2="1440"/>
    <line x1="0" y1="1800" x2="3840" y2="1800"/>
    <line x1="640"  y1="0" x2="640"  y2="2160"/>
    <line x1="1280" y1="0" x2="1280" y2="2160"/>
    <line x1="1920" y1="0" x2="1920" y2="2160"/>
    <line x1="2560" y1="0" x2="2560" y2="2160"/>
    <line x1="3200" y1="0" x2="3200" y2="2160"/>
  </g>

  <!-- Decorative glows -->
  <circle cx="3450" cy="260" r="520" fill="url(#glowCyan)"/>
  <circle cx="420" cy="1950" r="560" fill="url(#glowPurple)"/>

  <!-- ============ HEADER / EYEBROW ============ -->
  <text x="160" y="200" font-family="Segoe UI, Calibri, Arial, sans-serif" font-size="63"
        letter-spacing="9" fill="#4FD8E8" font-weight="600">CNOT-GATE</text>

  <!-- Accent rule -->
  <rect x="160" y="250" width="330" height="12" rx="6" fill="url(#accentGradient)"/>

  <g transform="translate(706.80,-637.60) scale(1.6)">


  <g transform="translate(120,900)">
    <g stroke="#8B6BE0" stroke-width="8">
      <line x1="250" y1="0" x2="250" y2="400"/>
    </g>
    <g stroke="#4FD8E8" stroke-width="5">
      <line x1="0" y1="0"   x2="500" y2="0"/>
      <line x1="0" y1="400" x2="500" y2="400"/>
    </g>
    <text x="-20" y="18" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-style="italic" fill="#F5F6FA">|q<tspan font-size="38" dy="14">1</tspan><tspan dy="-14">&#10217;</tspan></text>
    <text x="-20" y="418" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-style="italic" fill="#F5F6FA">|q<tspan font-size="38" dy="14">2</tspan><tspan dy="-14">&#10217;</tspan></text>
    <!-- target (XOR) on q1 -->
    <circle cx="250" cy="0" r="70" style="fill:#182449;stroke:#8B6BE0;stroke-width:7px;"/>
    <line x1="210" y1="0" x2="290" y2="0" stroke="#8B6BE0" stroke-width="9"/>
    <line x1="250" y1="-40" x2="250" y2="40" stroke="#8B6BE0" stroke-width="9"/>
    <!-- control dot on q2 -->
    <circle cx="250" cy="400" r="24" fill="#8B6BE0"/>
  </g>
  <g transform="translate(1072,1100)">
    <path d="M -248.0,-258.0 Q -302.25,8 -248.0,258.0" fill="none" stroke="url(#accentGradient)" stroke-width="12.4" stroke-linecap="round"/>
    <path d="M 248.0,-258.0 Q 302.25,8 248.0,258.0" fill="none" stroke="url(#accentGradient)" stroke-width="12.4" stroke-linecap="round"/>
    <text x="-148.8" y="-127.1" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">1</text>
    <text x="-49.6" y="-127.1" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="49.6" y="-127.1" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="148.8" y="-127.1" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="-148.8" y="-27.9" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="-49.6" y="-27.9" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">1</text>
    <text x="49.6" y="-27.9" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="148.8" y="-27.9" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="-148.8" y="71.3" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="-49.6" y="71.3" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="49.6" y="71.3" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="148.8" y="71.3" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">1</text>
    <text x="-148.8" y="170.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="-49.6" y="170.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="49.6" y="170.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">1</text>
    <text x="148.8" y="170.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="62.0" fill="#F5F6FA">0</text>
    <text x="294.5" y="294.5" font-family="Georgia, 'Times New Roman', serif" font-size="43.4" font-style="italic" fill="#8B6BE0">CNOT</text>
  </g>

  
  </g>

