      <line x1="142" y1="120" x2="218" y2="120" stroke="#F5F6FA" stroke-width="5"/>
      <text x="180" y="215" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="54" fill="#F5F6FA">&#8730;2</text>
