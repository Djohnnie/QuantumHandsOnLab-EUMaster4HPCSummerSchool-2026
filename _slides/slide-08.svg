<!-- Slide 08: Cryptography / security motif (padlock and keys) -->
<!-- Graphics recreated in SVG, inspired by https://github.com/Djohnnie/DeKrachtVanKwantumComputers-NerdlandFestival-2025/blob/main/_slides/08.jpg -->
<svg width="3840" height="2160" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
