<!-- Slide 37: H-Gate - gate symbol, Bloch sphere rotation, and matrix representation (based on Quantum-Summer-Lab-2025 slide 219.jpg; recolored copies of 03-01_gate-h.svg and 03-02_gate-h-bloch-sphere.svg) -->
<svg width="3840" height="2160" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
